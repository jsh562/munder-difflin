<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" role="img" aria-label="Munder Difflin — Local multi-agent harness for Claude Code">
  <title>Munder Difflin</title>
  <defs>
    <style>
      .mark { font-family: Impact, "Anton", "Arial Narrow", sans-serif; fill: #F4F1EA; }
      .big  { font-size: 96px;  font-weight: 900; letter-spacing: 1px; }
      .inc  { font-size: 30px;  font-weight: 900; }
      .sub  { font-family: "Tahoma", "DejaVu Sans", Geneva, sans-serif; font-size: 18px; letter-spacing: 9px; fill: #F4F1EA; }
      .tag  { font-family: "Tahoma", "DejaVu Sans", Geneva, sans-serif; font-size: 26px; fill: #E7E2D8; }
      .tag b{ fill: #F4D35E; }
      .mono { font-family: "DejaVu Sans Mono", Menlo, monospace; font-size: 15px; fill: #B9A9AC; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A0A0E"/>
      <stop offset="1" stop-color="#2A1014"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Maroon plate with the wordmark -->
  <g transform="translate(72, 96)">
    <rect x="0" y="0" width="430" height="220" fill="#6E1423"/>
    <rect x="0" y="0" width="430" height="220" fill="none" stroke="#4A0D17" stroke-width="7"/>
    <text class="mark big" x="30" y="98"  textLength="330" lengthAdjust="spacingAndGlyphs">MUNDER</text>
    <text class="mark big" x="30" y="184" textLength="345" lengthAdjust="spacingAndGlyphs">DIFFLIN,</text>
    <text class="mark inc" x="398" y="184" transform="rotate(-90 398 184)">INC.</text>
  </g>
  <text class="sub" x="74" y="345">MULTI-AGENT HARNESS</text>

  <!-- Right column copy -->
  <g transform="translate(560, 150)">
    <text class="tag" x="0" y="0">A hive of <b>Claude Code</b> agents that</text>
    <text class="tag" x="0" y="40">message, route, and remember —</text>
    <text class="tag" x="0" y="80">run by a <b>GOD</b> orchestrator you talk to.</text>
    <text class="mono" x="0" y="140">$ npm run dev   ·   local-first   ·   macOS</text>
  </g>
</svg>
