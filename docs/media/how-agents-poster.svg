<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Multiple terminal agents, managed and visualized in a simulation">
  <defs>
    <pattern id="fl2" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#D4EAB0"/>
      <rect width="20" height="20" fill="#B5D589"/>
      <rect x="20" y="20" width="20" height="20" fill="#B5D589"/>
    </pattern>
    <style>
      .px{font-family:"Press Start 2P",monospace;}
      .mn{font-family:"VT323","DejaVu Sans Mono",monospace;}
    </style>
  </defs>
  <rect width="960" height="600" fill="#1A1320"/>
  <rect x="24" y="24" width="912" height="552" fill="url(#fl2)" stroke="#4A0D17" stroke-width="6"/>

  <!-- three desks with terminals -->
  <g>
    <g transform="translate(90 110)">
      <rect width="220" height="150" fill="#0c0608" stroke="#1A1320" stroke-width="4"/>
      <g class="mn" font-size="17" fill="#6BCF7F"><text x="14" y="34">$ claude</text></g>
      <g class="mn" font-size="16" fill="#d7c9a8"><text x="14" y="60">reading SPEC.md…</text><text x="14" y="84">edit App.tsx</text><text x="14" y="108" fill="#FFD93D">running tests</text></g>
      <rect x="86" y="158" width="46" height="40" fill="#FF6B6B" stroke="#1A1320" stroke-width="3"/>
    </g>
    <g transform="translate(370 110)">
      <rect width="220" height="150" fill="#0c0608" stroke="#1A1320" stroke-width="4"/>
      <g class="mn" font-size="17" fill="#6BCF7F"><text x="14" y="34">$ claude</text></g>
      <g class="mn" font-size="16" fill="#d7c9a8"><text x="14" y="60">grep router…</text><text x="14" y="84" fill="#4ECDC4">web.fetch docs</text><text x="14" y="108">write notes</text></g>
      <rect x="86" y="158" width="46" height="40" fill="#4ECDC4" stroke="#1A1320" stroke-width="3"/>
    </g>
    <g transform="translate(650 110)">
      <rect width="220" height="150" fill="#0c0608" stroke="#1A1320" stroke-width="4"/>
      <g class="mn" font-size="17" fill="#6BCF7F"><text x="14" y="34">$ claude</text></g>
      <g class="mn" font-size="16" fill="#d7c9a8"><text x="14" y="60">bash build</text><text x="14" y="84">todo: 3 left</text><text x="14" y="108" fill="#FFD93D">thinking…</text></g>
      <rect x="86" y="158" width="46" height="40" fill="#FFD93D" stroke="#1A1320" stroke-width="3"/>
    </g>
  </g>

  <!-- envelopes between desks -->
  <g>
    <g transform="translate(320 175) rotate(-8)"><rect width="40" height="26" fill="#FFEC99" stroke="#1A1320" stroke-width="3"/><path d="M0 0 L20 15 L40 0" fill="none" stroke="#1A1320" stroke-width="3"/></g>
    <g transform="translate(600 200) rotate(8)"><rect width="40" height="26" fill="#B4E5BD" stroke="#1A1320" stroke-width="3"/><path d="M0 0 L20 15 L40 0" fill="none" stroke="#1A1320" stroke-width="3"/></g>
  </g>

  <!-- stations row -->
  <g class="mn" font-size="18" fill="#1A1320" text-anchor="middle">
    <g transform="translate(120 360)"><rect width="120" height="96" fill="#E5C896" stroke="#8B6F47" stroke-width="5"/><text x="60" y="56">file shelf</text></g>
    <g transform="translate(300 360)"><rect width="120" height="96" fill="#E5C896" stroke="#8B6F47" stroke-width="5"/><text x="60" y="56">terminal</text></g>
    <g transform="translate(480 360)"><rect width="120" height="96" fill="#D6C5FF" stroke="#8B6F47" stroke-width="5"/><text x="60" y="56">web portal</text></g>
    <g transform="translate(660 360)"><rect width="120" height="96" fill="#E5C896" stroke="#8B6F47" stroke-width="5"/><text x="60" y="56">task board</text></g>
  </g>

  <g class="px" font-size="16" fill="#F4D35E"><text x="40" y="540">EVERY TERMINAL IS AN AGENT.</text></g>
  <g class="mn" font-size="22" fill="#B9A9AC"><text x="40" y="568">walks to a station for every tool it runs.</text></g>
</svg>
